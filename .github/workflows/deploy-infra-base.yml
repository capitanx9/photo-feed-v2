name: deploy-infra-base

# Applies CloudFormation changes to the foundation stacks:
#   network -> iam -> secrets
#
# These are the one-shot foundation: VPC, OIDC + CI roles, Secrets Manager
# entries. Everything else (ECR, S3, EC2, Lambda) sits on top of these and
# lives in its own workflow under one folder = one workflow.
#
# Triggered on push to main when anything in infra/cf/base/ changes.
# Stack order is fixed for log readability; each step idempotently no-ops
# if there's no diff.

on:
  push:
    branches: [main]
    paths:
      - "infra/cf/base/**"
      - ".github/workflows/deploy-infra-base.yml"
      # DNS is deployed by deploy-infra-dns.yml (needs a bespoke import
      # bootstrap; see infra/cf/base/dns.yaml). Skip it here so we don't
      # try to `deploy` a non-existent stack from a fresh clone.
      - "!infra/cf/base/dns.yaml"
  workflow_dispatch:

concurrency:
  group: photo-feed-deploy-infra-base
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC to assume the infra role
  contents: read

env:
  AWS_REGION: eu-central-1
  ROLE_ARN: arn:aws:iam::797890596022:role/photo-feed-github-actions-infra

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy network
        run: |
          aws cloudformation deploy \
            --template-file infra/cf/base/network.yaml \
            --stack-name photo-feed-base-network \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset

      - name: Deploy iam
        run: |
          aws cloudformation deploy \
            --template-file infra/cf/base/iam.yaml \
            --stack-name photo-feed-base-iam \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset

      - name: Deploy secrets
        run: |
          aws cloudformation deploy \
            --template-file infra/cf/base/secrets.yaml \
            --stack-name photo-feed-base-secrets \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset
