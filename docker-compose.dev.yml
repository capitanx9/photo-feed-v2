# Local development stack — everything the app needs to run end-to-end
# on your laptop with hot reload.
#
#   db          postgres
#   redis       broker + cache
#   minio       S3-compatible object store on :9000 (console :9001)
#   minio-init  one-shot bucket provisioner
#   api         Django runserver on :8000
#   api-worker  Celery worker (AI generate + friends)
#   api-beat    Celery beat (hourly orphan-media cleanup)
#   web         Next.js `next dev` on :3000
#
# Sources are bind-mounted so edits reload without a rebuild. Images
# rebuild only when Dockerfile.dev or lockfiles change.
#
# Usage:
#   make dev-up          # start everything in the background
#   make dev-logs        # tail every service
#   make dev-migrate     # run Django migrations
#   make dev-seed        # populate demo users + posts
#   make dev-down        # stop
#   make dev-reset-db    # wipe volume + fresh migrate + seed
#
# Notes:
# - Nothing here needs AWS creds by default — S3/Bedrock calls will hit
#   the real AWS if configured, but the golden path (auth/posts/cart)
#   works standalone against local postgres + redis.
# - `next dev` binds to 0.0.0.0 so http://localhost:3000 works from the
#   host across every OS. Django `runserver` same story.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api
      POSTGRES_DB: api
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api -d api"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - dev_redis:/data

  # Local S3 stand-in so seed.py and the media/AI flows can put_object /
  # get_object without real AWS creds. Everything in-repo that reads S3
  # honours AWS_S3_ENDPOINT_URL (see packages/api/src/common/s3.py). The
  # console at http://localhost:9001 (user `minio`, pass `minio123`)
  # lets you poke at objects the way you would in the AWS console.
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - dev_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Creates the buckets the app expects and exits. depends_on ordering
  # keeps api/worker from booting until this has provisioned.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio minio123;
        mc mb --ignore-existing local/photo-feed-uploads;
        mc mb --ignore-existing local/photo-feed-generated-usw2;
        mc anonymous set download local/photo-feed-uploads;
      "

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: dev-insecure-do-not-use-outside-localhost
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: api
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RATELIMIT_ENABLE: "false"
      # S3 goes to the local MinIO. Real AWS credentials aren't needed
      # in dev — MinIO speaks the S3 API with the fake key/secret below.
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_S3_ENDPOINT_URL: http://minio:9000
      # Presigner URLs land in the browser, so they must resolve from
      # the host, not from inside the docker network.
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_UPLOADS_BUCKET: photo-feed-uploads
      S3_GENERATED_BUCKET: photo-feed-generated-usw2
      S3_GENERATED_REGION: eu-central-1
      # Uncomment to route AI generation through the real Bedrock lambda.
      # BEDROCK_REGION: us-west-2
      # GENERATE_IMAGE_LAMBDA_NAME: photo-feed-generate-image-stage
    volumes:
      - ./packages/api:/app/packages/api
      - ./pyproject.toml:/workspace/pyproject.toml:ro
      - ./uv.lock:/workspace/uv.lock:ro
    working_dir: /app/packages/api
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  api-worker:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.dev
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: dev-insecure-do-not-use-outside-localhost
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: api
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_UPLOADS_BUCKET: photo-feed-uploads
      S3_GENERATED_BUCKET: photo-feed-generated-usw2
      S3_GENERATED_REGION: eu-central-1
    volumes:
      - ./packages/api:/app/packages/api
    working_dir: /app/packages/api
    command:
      - celery
      - -A
      - api.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  api-beat:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.dev
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: dev-insecure-do-not-use-outside-localhost
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: api
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_S3_ENDPOINT_URL: http://minio:9000
      S3_UPLOADS_BUCKET: photo-feed-uploads
    volumes:
      - ./packages/api:/app/packages/api
    working_dir: /app/packages/api
    command:
      - celery
      - -A
      - api.celery_app
      - beat
      - --loglevel=info
      - --schedule=/tmp/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # Next.js dev server proxies /api/* to the Django api container.
      # See packages/web/next.config.ts for the rewrite rules.
      API_ORIGIN: http://api:8000
    volumes:
      - ./packages/web:/app/packages/web
      # Keep the container's Linux node_modules — a host-side npm install
      # would drop macOS/Windows binaries into this path and break the
      # image.
      - dev_web_node_modules:/app/packages/web/node_modules
      # .next also container-owned; avoids ownership conflicts with host.
      - dev_web_next:/app/packages/web/.next
    depends_on:
      - api

volumes:
  dev_postgres:
  dev_redis:
  dev_minio:
  dev_web_node_modules:
  dev_web_next:
