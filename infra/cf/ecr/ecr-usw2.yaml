AWSTemplateFormatVersion: "2010-09-09"

Description: >
  photo-feed ECR (us-west-2) — repository for the generate_image Lambda
  image. generate_image runs in us-west-2 (next to Bedrock SD3), so its
  ECR repo lives there too. cut_image runs in eu-central-1 and its repo
  is in photo-feed-ecr-euc1.

  Separate stack from photo-feed-ecr-euc1 because CloudFormation stacks
  are region-scoped.

  Stack name: photo-feed-ecr-usw2
  Deploy: aws cloudformation deploy --template-file infra/cf/ecr/ecr-usw2.yaml \
            --stack-name photo-feed-ecr-usw2 --region us-west-2


Resources:

  # ----------------------------------------------------------------------
  # photo-feed-generate-image — Bedrock SD3 Lambda, pushed by build-generate-image.
  # ----------------------------------------------------------------------

  GenerateImageRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: photo-feed-generate-image
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      # Allow the Lambda service to pull this image when CF creates the
      # function in photo-feed-lambdas-usw2. Without this Lambda gets
      # AccessDenied at function-creation time.
      RepositoryPolicyText:
        Version: "2012-10-17"
        Statement:
          - Sid: LambdaECRImageRetrievalPolicy
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - ecr:BatchGetImage
              - ecr:GetDownloadUrlForLayer
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 30 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPatternList": ["*"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Remove untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              }
            ]
          }


Outputs:

  GenerateImageRepositoryUri:
    Description: ECR repository URI for the generate_image Lambda
    Value: !GetAtt GenerateImageRepository.RepositoryUri
    Export:
      Name: photo-feed-generate-image-ecr-uri

  GenerateImageRepositoryArn:
    Description: ECR repository ARN for the generate_image Lambda
    Value: !GetAtt GenerateImageRepository.Arn
    Export:
      Name: photo-feed-generate-image-ecr-arn
