AWSTemplateFormatVersion: "2010-09-09"

Description: >
  photo-feed ECR (eu-central-1) — repositories for images that run in
  eu-central-1: Django api, Next.js web, and cut_image Lambda.
  generate_image lives in us-west-2 next to Bedrock; its repo is in the
  photo-feed-ecr-usw2 stack. Lifecycle policy keeps the last 30 tagged
  images and prunes untagged ones after 7 days.

  Stack name: photo-feed-ecr-euc1
  Deploy: aws cloudformation deploy --template-file infra/cf/ecr/ecr-euc1.yaml \
            --stack-name photo-feed-ecr-euc1 --region eu-central-1


Resources:

  # ----------------------------------------------------------------------
  # photo-feed-api — Django/gunicorn image, pushed by build-web-back.
  # ----------------------------------------------------------------------

  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: photo-feed-api
      ImageScanningConfiguration:
        # Scan on every push so we know about CVEs in newly built images.
        # Result viewable in ECR console / via DescribeImageScanFindings.
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 30 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPatternList": ["*"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Remove untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # ----------------------------------------------------------------------
  # photo-feed-web — Next.js standalone image, pushed by build-web-front.
  # ----------------------------------------------------------------------

  WebRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: photo-feed-web
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 30 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPatternList": ["*"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Remove untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # ----------------------------------------------------------------------
  # photo-feed-cut-image — Pillow square-crop Lambda image,
  # pushed by build-cut-image. The Lambda itself runs in eu-central-1
  # (next to the uploads bucket), so its image lives in this regional
  # ECR. The other Lambda (generate_image) lives in us-west-2 next to
  # Bedrock — see photo-feed-base-ecr-usw2 stack.
  # ----------------------------------------------------------------------

  CutImageRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: photo-feed-cut-image
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 30 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPatternList": ["*"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Remove untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              }
            ]
          }


Outputs:

  ApiRepositoryUri:
    Description: ECR repository URI for the api image
    Value: !GetAtt ApiRepository.RepositoryUri
    Export:
      Name: photo-feed-api-ecr-uri

  WebRepositoryUri:
    Description: ECR repository URI for the web image
    Value: !GetAtt WebRepository.RepositoryUri
    Export:
      Name: photo-feed-web-ecr-uri

  ApiRepositoryArn:
    Description: ECR repository ARN for the api image
    Value: !GetAtt ApiRepository.Arn
    Export:
      Name: photo-feed-api-ecr-arn

  WebRepositoryArn:
    Description: ECR repository ARN for the web image
    Value: !GetAtt WebRepository.Arn
    Export:
      Name: photo-feed-web-ecr-arn

  CutImageRepositoryUri:
    Description: ECR repository URI for the cut_image Lambda
    Value: !GetAtt CutImageRepository.RepositoryUri
    Export:
      Name: photo-feed-cut-image-ecr-uri

  CutImageRepositoryArn:
    Description: ECR repository ARN for the cut_image Lambda
    Value: !GetAtt CutImageRepository.Arn
    Export:
      Name: photo-feed-cut-image-ecr-arn
