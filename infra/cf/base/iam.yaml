AWSTemplateFormatVersion: "2010-09-09"

Description: >
  photo-feed base IAM — OIDC provider for GitHub Actions, three CI roles,
  and the EC2 instance role with ALL its policies (including S3 — the one
  forgotten in v1 which broke production).

  Stack name: photo-feed-base-iam
  Deploy: aws cloudformation deploy --template-file infra/cf/base/iam.yaml \
            --stack-name photo-feed-base-iam --capabilities CAPABILITY_NAMED_IAM \
            --region eu-central-1


Parameters:

  GitHubOrg:
    Type: String
    Default: capitanx9
    Description: GitHub username/org that owns the repo.

  GitHubRepo:
    Type: String
    Default: photo-feed-v2
    Description: Repository name.

  AccountId:
    Type: String
    Default: "797890596022"
    Description: AWS account ID (used in resource ARN restrictions).


Resources:

  # ======================================================================
  # OIDC provider — the door for GitHub Actions to assume AWS roles.
  #
  # Without this, no GH Actions workflow can talk to AWS. Created once,
  # shared across all three CI roles below.
  # ======================================================================

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # Default thumbprint for token.actions.githubusercontent.com.
        # AWS now verifies via the library it ships with, so this is largely
        # a formality, but the field is still required.
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # ======================================================================
  # GitHub Actions role: photo-feed-github-actions-api
  #
  # Used by:
  #   - build-web-back        (push image to ECR, mint bot token to bump tag)
  #   - build-web-front       (same for web image)
  #   - deploy-host-stage     (SSM SendCommand → apply.sh on EC2)
  #
  # Permissions:
  #   - ECR push on photo-feed-api / photo-feed-web
  #   - SSM SendCommand on EC2 with tag Application=photo-feed
  #   - EC2 describe-instances (to find the target)
  #   - SSM get-parameter on /photo-feed/*
  # ======================================================================

  GithubActionsApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: photo-feed-github-actions-api
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Bound to the main branch of this repo only.
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: ECRPushApiAndWeb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource:
                  - !Sub arn:aws:ecr:eu-central-1:${AccountId}:repository/photo-feed-api
                  - !Sub arn:aws:ecr:eu-central-1:${AccountId}:repository/photo-feed-web
        - PolicyName: SSMRunCommandOnPhotoFeedEC2
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: "*"
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub arn:aws:ec2:eu-central-1:${AccountId}:instance/*
                Condition:
                  StringEquals:
                    aws:ResourceTag/Application: photo-feed
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - arn:aws:ssm:eu-central-1::document/AWS-RunShellScript
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"
        - PolicyName: SecretsManagerReadStage
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub arn:aws:secretsmanager:eu-central-1:${AccountId}:secret:/photo-feed/stage/*

  # ======================================================================
  # GitHub Actions role: photo-feed-github-actions-lambdas
  #
  # Used by:
  #   - deploy-lambdas-stage  (sam deploy in eu-central-1 + us-west-2)
  #
  # Permissions:
  #   - CloudFormation/SAM deploy on photo-feed-lambdas-* stacks
  #   - Lambda update
  #   - IAM PassRole for the lambda execution role created inside the stacks
  #   - S3 manage on uploads + generated buckets (managed by lambda stacks)
  #   - SSM read for WebhookSharedSecret (used at deploy time as parameter)
  # ======================================================================

  GithubActionsLambdasRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: photo-feed-github-actions-lambdas
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: CloudFormationLambdaStacks
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub arn:aws:cloudformation:eu-central-1:${AccountId}:stack/photo-feed-lambdas-*/*
                  - !Sub arn:aws:cloudformation:us-west-2:${AccountId}:stack/photo-feed-lambdas-*/*
              # SAM uses --resolve-s3 which creates a managed bucket
              # aws-sam-cli-managed-default-* — needs S3 access to that.
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::aws-sam-cli-managed-*
                  - arn:aws:s3:::aws-sam-cli-managed-*/*
              - Effect: Allow
                Action:
                  - lambda:*
                Resource:
                  - !Sub arn:aws:lambda:eu-central-1:${AccountId}:function:photo-feed-*
                  - !Sub arn:aws:lambda:us-west-2:${AccountId}:function:photo-feed-*
              - Effect: Allow
                Action:
                  - iam:PassRole
                  - iam:GetRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:ListRoleTags
                Resource:
                  - !Sub arn:aws:iam::${AccountId}:role/photo-feed-lambdas-*
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub arn:aws:secretsmanager:eu-central-1:${AccountId}:secret:/photo-feed/stage/WEBHOOK_SHARED_SECRET-*
              # ECR push for the two Lambda images. cut_image lives in
              # eu-central-1 (next to the uploads bucket), generate_image
              # in us-west-2 (next to Bedrock). build-cut-image and
              # build-generate-image workflows use this role to push.
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource:
                  - !Sub arn:aws:ecr:eu-central-1:${AccountId}:repository/photo-feed-cut-image
                  - !Sub arn:aws:ecr:us-west-2:${AccountId}:repository/photo-feed-generate-image

  # ======================================================================
  # GitHub Actions role: photo-feed-github-actions-infra
  #
  # Used by:
  #   - deploy-infra-base       (deploys photo-feed-base-* stacks)
  #   - deploy-infra-ec2-stage  (deploys photo-feed-ec2-stage)
  #
  # Permissions:
  #   - CloudFormation full on photo-feed-* stacks (excl. lambdas — those
  #     have a dedicated role)
  #   - IAM PassRole / role manage on photo-feed-* roles
  #   - EC2, Route53, ECR full on photo-feed-* (necessary for the stacks
  #     they own)
  # ======================================================================

  GithubActionsInfraRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: photo-feed-github-actions-infra
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: CloudFormationInfraStacks
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource:
                  # All non-Lambda stacks under the photo-feed-* prefix:
                  #   photo-feed-base-*   (network, iam, secrets)
                  #   photo-feed-ecr-*    (per-region ECR)
                  #   photo-feed-s3-*     (per-region S3)
                  #   photo-feed-ec2-*    (stage / prod EC2)
                  # Lambda stacks have their own dedicated role.
                  - !Sub arn:aws:cloudformation:eu-central-1:${AccountId}:stack/photo-feed-*/*
                  - !Sub arn:aws:cloudformation:us-west-2:${AccountId}:stack/photo-feed-*/*
              - Effect: Allow
                Action:
                  - ec2:*
                  - route53:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:*
                Resource: "*"
              # S3 admin for the s3-{euc1,usw2} stacks. CreateBucket needs
              # Resource: "*" because the bucket ARN doesn't exist at
              # creation time and IAM can't match a wildcard against a
              # non-existent ARN. Mutations on existing buckets are scoped
              # to photo-feed-* via the second statement.
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:DeleteBucket
                  - s3:PutBucketTagging
                  - s3:PutBucketCORS
                  - s3:PutLifecycleConfiguration
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketOwnershipControls
                  - s3:PutBucketVersioning
                  - s3:PutBucketNotification
                  - s3:PutBucketAcl
                  - s3:GetBucket*
                  - s3:GetLifecycleConfiguration
                  - s3:GetBucketPolicy
                  - s3:GetBucketCORS
                  - s3:GetBucketLocation
                  - s3:GetBucketPublicAccessBlock
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::photo-feed-*
              # Secrets Manager admin for the photo-feed-base-secrets stack.
              # GenerateSecretString in CF dispatches GetRandomPassword which
              # is account-scoped (no per-secret ARN exists at call time).
              # Per-secret mutations are scoped to /photo-feed/*.
              - Effect: Allow
                Action:
                  - secretsmanager:GetRandomPassword
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:PutResourcePolicy
                  - secretsmanager:DeleteResourcePolicy
                  - secretsmanager:GetResourcePolicy
                Resource:
                  - !Sub arn:aws:secretsmanager:eu-central-1:${AccountId}:secret:/photo-feed/*
              - Effect: Allow
                Action:
                  - iam:*
                # Two naming conventions in this stack:
                #   - photo-feed-github-actions-*  (kebab-case CI roles)
                #   - PhotoFeed*                   (PascalCase: PhotoFeedInstanceRole,
                #                                   PhotoFeedInstanceProfile)
                # Resource patterns cover both.
                Resource:
                  - !Sub arn:aws:iam::${AccountId}:role/photo-feed-*
                  - !Sub arn:aws:iam::${AccountId}:role/PhotoFeed*
                  - !Sub arn:aws:iam::${AccountId}:instance-profile/photo-feed-*
                  - !Sub arn:aws:iam::${AccountId}:instance-profile/PhotoFeed*
              - Effect: Allow
                Action:
                  - iam:CreateOpenIDConnectProvider
                  - iam:GetOpenIDConnectProvider
                  - iam:DeleteOpenIDConnectProvider
                  - iam:UpdateOpenIDConnectProviderThumbprint
                Resource: "*"
              # Read public AWS-published SSM parameters (Canonical AMI IDs,
              # ECS-optimised AMI IDs, etc.). Scoped to /aws/service/*
              # which is read-only public data — never any of our secrets.
              # ec2-stage.yaml uses this to resolve the latest Ubuntu 24.04
              # AMI ID without pinning a value that would go stale.
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - arn:aws:ssm:eu-central-1::parameter/aws/service/*

  # ======================================================================
  # EC2 Instance Role: PhotoFeedInstanceRole
  #
  # Attached to the EC2 instance via the InstanceProfile below.
  # This is the role that the Django runtime on EC2 uses for:
  #   - reading SSM secrets in apply.sh
  #   - pulling ECR images
  #   - PUT/GET on photo-feed-uploads bucket (THE policy missing in v1)
  #   - SSM agent for SendCommand to work
  # ======================================================================

  PhotoFeedInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PhotoFeedInstanceRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        # The policy whose absence killed prod in v1. Now part of IaC; can't
        # be forgotten.
        - PolicyName: PhotoFeedInstanceRole-S3Uploads
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: PhotoFeedUploadsRW
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:AbortMultipartUpload
                  - s3:DeleteObject
                Resource: arn:aws:s3:::photo-feed-uploads/*
              - Sid: PhotoFeedUploadsListBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: arn:aws:s3:::photo-feed-uploads
              # Read access to the generated/drafts bucket in us-west-2 so
              # the approve endpoint can server-side CopyObject draft PNGs
              # cross-region into photo-feed-uploads/processed/ai/.
              - Sid: PhotoFeedGeneratedRead
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: arn:aws:s3:::photo-feed-generated-usw2/*
        - PolicyName: PhotoFeedInstanceRole-SecretsManagerStage
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub arn:aws:secretsmanager:eu-central-1:${AccountId}:secret:/photo-feed/stage/*
        # apply.sh reads StageDomain from the ec2-stage stack outputs to
        # render nginx.conf and ALLOWED_HOSTS. Without this, we can't
        # resolve the domain at runtime.
        - PolicyName: PhotoFeedInstanceRole-DescribeStacks
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource:
                  - !Sub arn:aws:cloudformation:eu-central-1:${AccountId}:stack/photo-feed-ec2-*/*
        # Amazon Polly powers the /api/posts/<id>/tts/ endpoint. Polly
        # has no resource-level permissions — the action always requires
        # "*" as its Resource.
        - PolicyName: PhotoFeedInstanceRole-Polly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - polly:SynthesizeSpeech
                Resource: "*"
        # Amazon Transcribe powers /api/stt/. StartTranscriptionJob and
        # GetTranscriptionJob don't accept resource ARNs; S3 access to
        # the media + output objects is already covered by the S3Uploads
        # statement above (Transcribe uses the caller's identity for
        # both reads and writes).
        - PolicyName: PhotoFeedInstanceRole-Transcribe
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - transcribe:StartTranscriptionJob
                  - transcribe:GetTranscriptionJob
                Resource: "*"

  PhotoFeedInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: PhotoFeedInstanceProfile
      Roles:
        - !Ref PhotoFeedInstanceRole


Outputs:

  GitHubOIDCProviderArn:
    Description: OIDC provider ARN (referenced by all CI roles)
    Value: !Ref GitHubOIDCProvider
    Export:
      Name: photo-feed-oidc-provider-arn

  GithubActionsApiRoleArn:
    Description: ARN of the CI role for build-web-* / deploy-host-*
    Value: !GetAtt GithubActionsApiRole.Arn
    Export:
      Name: photo-feed-github-actions-api-role-arn

  GithubActionsLambdasRoleArn:
    Description: ARN of the CI role for deploy-lambdas-*
    Value: !GetAtt GithubActionsLambdasRole.Arn
    Export:
      Name: photo-feed-github-actions-lambdas-role-arn

  GithubActionsInfraRoleArn:
    Description: ARN of the CI role for deploy-infra-*
    Value: !GetAtt GithubActionsInfraRole.Arn
    Export:
      Name: photo-feed-github-actions-infra-role-arn

  InstanceRoleArn:
    Description: ARN of the EC2 instance role
    Value: !GetAtt PhotoFeedInstanceRole.Arn
    Export:
      Name: photo-feed-instance-role-arn

  InstanceProfileName:
    Description: Name of the instance profile (used in ec2-stage.yaml)
    Value: !Ref PhotoFeedInstanceProfile
    Export:
      Name: photo-feed-instance-profile-name
