AWSTemplateFormatVersion: "2010-09-09"

Description: >
  photo-feed base secrets — three Secrets Manager entries for stage.
  Values are generated by Secrets Manager at create time and never appear
  in templates, parameters, git, CloudTrail (as values), or my laptop.

  Stack name: photo-feed-base-secrets
  Deploy: aws cloudformation deploy --template-file infra/cf/base/secrets.yaml \
            --stack-name photo-feed-base-secrets --region eu-central-1

  Read at runtime:
    aws secretsmanager get-secret-value \
      --secret-id /photo-feed/stage/DJANGO_SECRET_KEY \
      --query SecretString --output text


Resources:

  # ----------------------------------------------------------------------
  # Django SECRET_KEY — used for session cookies, CSRF tokens, password
  # reset links. 64 chars without punctuation is well above the entropy
  # Django docs require.
  # ----------------------------------------------------------------------

  DjangoSecretKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /photo-feed/stage/DJANGO_SECRET_KEY
      Description: Django SECRET_KEY for stage environment
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: Application
          Value: photo-feed
        - Key: Environment
          Value: stage

  # ----------------------------------------------------------------------
  # PostgreSQL password — used by both Django (connection string) and the
  # postgres container itself (POSTGRES_PASSWORD env var). 32 chars without
  # punctuation to avoid shell-escaping pain when it leaks into env files.
  # ----------------------------------------------------------------------

  PostgresPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /photo-feed/stage/POSTGRES_PASSWORD
      Description: PostgreSQL password for stage database
      GenerateSecretString:
        PasswordLength: 32
        ExcludePunctuation: true
      Tags:
        - Key: Application
          Value: photo-feed
        - Key: Environment
          Value: stage

  # ----------------------------------------------------------------------
  # Webhook shared secret — proves a webhook call really came from our
  # Lambda (cut_image / generate_image) and not from someone hitting the
  # internal endpoint directly. 48 chars without punctuation.
  # ----------------------------------------------------------------------

  WebhookSharedSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /photo-feed/stage/WEBHOOK_SHARED_SECRET
      Description: Shared secret signing internal lambda -> Django webhooks
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true
      Tags:
        - Key: Application
          Value: photo-feed
        - Key: Environment
          Value: stage


Outputs:

  DjangoSecretKeyArn:
    Description: Secret ARN for Django SECRET_KEY (stage)
    Value: !Ref DjangoSecretKey
    Export:
      Name: photo-feed-stage-django-secret-key-arn

  PostgresPasswordArn:
    Description: Secret ARN for Postgres password (stage)
    Value: !Ref PostgresPassword
    Export:
      Name: photo-feed-stage-postgres-password-arn

  WebhookSharedSecretArn:
    Description: Secret ARN for lambda webhook shared secret (stage)
    Value: !Ref WebhookSharedSecret
    Export:
      Name: photo-feed-stage-webhook-shared-secret-arn
