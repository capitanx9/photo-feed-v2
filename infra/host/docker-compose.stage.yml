# photo-feed stage stack on EC2.
#
# Launched via infra/host/apply.sh, which:
#   - loads tags from infra/host/images.env  (compose --env-file)
#   - exports secrets from Secrets Manager into the shell process
#     (compose reads ${VAR} from the parent env, no .env file on disk)
#
# Services:
#   web         Django + gunicorn (api + admin)
#   web-worker  Celery worker (ai.generate_image and friends)
#   web-beat    Celery beat scheduler (hourly orphan-media cleanup)
#   web-front   Next.js (App Router)
#   db          postgres
#   redis       redis (Django cache + Celery broker)
#   nginx       routes /api/, /admin/, /static/, /media/, /internal/
#               to web; everything else to web-front
#   certbot     Let's Encrypt renewal loop

services:

  web:
    image: ${ECR_REGISTRY}/photo-feed-api:${API_IMAGE_TAG}
    restart: unless-stopped
    environment:
      # DJANGO_SETTINGS_MODULE (api.settings) and PYTHONPATH (/app/src)
      # are baked into the Dockerfile — don't override them here.
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}

      ALLOWED_HOSTS: ${STAGE_DOMAIN}
      CSRF_TRUSTED_ORIGINS: https://${STAGE_DOMAIN}
      CORS_ALLOWED_ORIGINS: https://${STAGE_DOMAIN}

      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: api
      POSTGRES_USER: api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      WEBHOOK_SHARED_SECRET: ${WEBHOOK_SHARED_SECRET}

      AWS_REGION: eu-central-1
      S3_UPLOADS_BUCKET: photo-feed-uploads
      S3_GENERATED_BUCKET: photo-feed-generated-usw2
      S3_GENERATED_REGION: us-west-2
      BEDROCK_REGION: us-west-2
      GENERATE_IMAGE_LAMBDA_NAME: photo-feed-generate-image-stage
      AWS_S3_ENDPOINT_URL: ""
      AWS_S3_PUBLIC_ENDPOINT_URL: ""
    command:
      - gunicorn
      - --bind=0.0.0.0:8000
      - --workers=3
      - --access-logfile=-
      - --error-logfile=-
      - api.wsgi:application
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web-worker:
    # Same image as `web`; runs Celery instead of gunicorn. Reads the
    # same env (DB, Redis, S3, Bedrock) so tasks can hit the DB and
    # invoke the generate_image Lambda via boto3.
    image: ${ECR_REGISTRY}/photo-feed-api:${API_IMAGE_TAG}
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: api
      POSTGRES_USER: api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WEBHOOK_SHARED_SECRET: ${WEBHOOK_SHARED_SECRET}
      AWS_REGION: eu-central-1
      S3_UPLOADS_BUCKET: photo-feed-uploads
      S3_GENERATED_BUCKET: photo-feed-generated-usw2
      S3_GENERATED_REGION: us-west-2
      BEDROCK_REGION: us-west-2
      GENERATE_IMAGE_LAMBDA_NAME: photo-feed-generate-image-stage
      AWS_S3_ENDPOINT_URL: ""
      AWS_S3_PUBLIC_ENDPOINT_URL: ""
    command:
      - celery
      - -A
      - api.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web-beat:
    # Celery beat scheduler. Just produces task messages on the redis
    # broker on the configured schedule; the existing web-worker picks
    # them up. Kept as its own service (not `worker -B`) so scaling
    # workers doesn't spawn duplicate scheduler instances.
    image: ${ECR_REGISTRY}/photo-feed-api:${API_IMAGE_TAG}
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: api
      POSTGRES_USER: api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AWS_REGION: eu-central-1
      S3_UPLOADS_BUCKET: photo-feed-uploads
    command:
      - celery
      - -A
      - api.celery_app
      - beat
      - --loglevel=info
      - --schedule=/tmp/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web-front:
    image: ${ECR_REGISTRY}/photo-feed-web:${WEB_IMAGE_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Pin explicitly: docker auto-sets HOSTNAME=<container_name> by
      # default, and Next standalone server.js binds to whatever HOSTNAME
      # says at startup. Container-name as a hostname doesn't resolve →
      # nginx can't reach next-front. 0.0.0.0 accepts traffic from the
      # docker network. (Bit us in Lab 4 v1.)
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      - web

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: api
      POSTGRES_USER: api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api -d api"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/photo-feed.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
      - web-front

  # Renewal loop. The first cert must be issued manually via
  # `docker compose run --rm certbot certonly ...` after DNS is in place
  # (see docs/runbooks/cert-bootstrap.md). After that this loop just
  # renews every 12 h.
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c
      "trap exit TERM;
       while :;
       do
         certbot renew --webroot -w /var/www/certbot --quiet || true;
         sleep 12h & wait $${!};
       done"

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_www:
