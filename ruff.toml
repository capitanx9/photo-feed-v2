line-length = 100
target-version = "py312"

# Django-generated migrations follow Django's own style, not ours — leave
# them alone so `makemigrations` output doesn't churn on lint.
extend-exclude = ["**/migrations/**"]

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
  "SIM", # flake8-simplify
  "RUF", # ruff-specific
]
ignore = [
  "E501",  # line too long — formatter handles it
]

[format]
quote-style = "double"
indent-style = "space"

[lint.per-file-ignores]
# Django/DRF idiom: class-level mutable attrs (Meta.fields, permission_classes,
# authentication_classes, serializer_class, etc.) are part of the framework
# contract — not user-mutated state. RUF012 misfires here.
"**/views.py" = ["RUF012"]
"**/serializers.py" = ["RUF012"]
"**/models.py" = ["RUF012"]
"**/admin.py" = ["RUF012"]
# tts.py + stt.py + wait_confirm.py host DRF APIViews too, same RUF012 misfire.
"**/tts.py" = ["RUF012"]
"**/stt.py" = ["RUF012"]
"**/wait_confirm.py" = ["RUF012"]
